<!-- SOS OVERLAY MODAL -->
<div class="absolute inset-0 bg-black/40 backdrop-blur-sm z-[100] items-center justify-center p-4 hidden"
    id="sos-modal">
    <div class="bg-white rounded-3xl p-6 text-center w-full max-w-[340px] shadow-xl transform transition-all">
        <h2 class="text-[20px] font-bold text-navy mb-3">Send SOS Alert?</h2>
        <p class="text-[14px] text-slate leading-relaxed mb-6">This will immediately send your current location and an
            emergency alert to your Safety Circle (Family, Neighbors) and Pasig City LDRRMO.</p>
        <div class="flex gap-3">
            <button
                class="flex-1 h-12 rounded-xl bg-gray-50 border border-gray-200 text-slate font-semibold text-[14px] active:scale-95 transition-transform"
                id="sos-cancel-btn">Cancel</button>
            <button
                class="flex-1 h-12 rounded-xl bg-emergency text-white font-semibold text-[14px] shadow-md shadow-red-500/20 active:scale-95 transition-transform"
                id="sos-send-btn">SEND NOW</button>
        </div>
    </div>
</div>

<div class="absolute inset-0 bg-deep/95 backdrop-blur-md z-[100] hidden items-center justify-center p-6 text-center text-white"
    id="sos-success-modal">
    <div class="w-full max-w-[340px]">
        <div
            class="w-20 h-20 rounded-full border-4 border-white/20 flex items-center justify-center mx-auto mb-6 bg-white/10 backdrop-blur-md animate-[bounce_1s_ease-in-out]">
            <i data-lucide="check" class="w-10 h-10 text-white"></i>
        </div>
        <h2 class="text-[28px] font-bold tracking-tight mb-3">SOS Sent!</h2>
        <p class="text-[15px] text-white/90 leading-relaxed mb-8">Your location has been shared with 3 contacts and
            Pasig City Dispatch.</p>

        <div class="bg-white/10 rounded-2xl p-4 mb-8 backdrop-blur-md border border-white/10 text-left">
            <div class="flex justify-between items-center text-[14px] mb-4">
                <span class="font-medium text-white/90">Maria Santos (Family)</span>
                <i data-lucide="check-circle-2" class="w-5 h-5 text-white"></i>
            </div>
            <div class="flex justify-between items-center text-[14px] mb-4">
                <span class="font-medium text-white/90">Jose Reyes (Family)</span>
                <i data-lucide="check-circle-2" class="w-5 h-5 text-white"></i>
            </div>
            <div class="flex justify-between items-center text-[14px]">
                <span class="font-medium text-white/90">Barangay Kapitolyo</span>
                <i data-lucide="check-circle-2" class="w-5 h-5 text-white"></i>
            </div>
        </div>

        <button
            class="w-full h-14 bg-white text-deep rounded-2xl font-bold text-[16px] active:scale-95 transition-transform shadow-xl shadow-black/20"
            id="sos-close-btn">Close</button>
    </div>
</div>
