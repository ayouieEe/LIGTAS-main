<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LIGTAS - Login</title>

    <!-- Tailwind CSS & Custom Config -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        emergency: '#D32F2F',
                        alert: '#E53935',
                        tint: '#FFEBEE',
                        deep: '#B71C1C',
                        safe: '#2E7D32',
                        amber: '#E65100',
                        flood: '#1565C0',
                        quake: '#6A1B9A',
                        medical: '#00695C',
                        navy: '#1C1C1E',
                        slate: '#6B7280',
                    },
                    fontFamily: {
                        sans: ['Inter', 'ui-sans-serif', 'system-ui', '-apple-system', 'BlinkMacSystemFont', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- Global Stylesheet -->
    <link rel="stylesheet" href="../style.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .btn.loading {
            position: relative;
            color: transparent;
        }
        .btn.loading::after {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            top: 50%;
            left: 50%;
            margin-left: -8px;
            margin-top: -8px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-900 flex justify-center items-center min-h-screen text-navy antialiased">

    <div class="w-full max-w-[390px] h-[100vh] max-h-[844px] bg-gray-50 relative overflow-hidden shadow-2xl sm:rounded-[40px] flex flex-col sm:border-[8px] sm:border-gray-800">

        <!-- MAIN CONTENT -->
        <main class="flex-1 overflow-y-auto bg-gray-50 px-4 py-6 flex flex-col">

            <!-- Logo and Header -->
            <div class="text-center mb-8">
                <div class="flex justify-center mb-4">
                    <i data-lucide="shield-check" class="w-12 h-12 text-emergency"></i>
                </div>
                <h1 class="text-[24px] font-bold text-navy mb-1">Welcome Back</h1>
                <p class="text-[13px] text-slate">Stay Safe. Stay Prepared.</p>
            </div>

            <!-- Login Form -->
            <form class="space-y-4 flex-1" id="loginForm">
                <!-- Email Input -->
                <div>
                    <label class="block text-[12px] font-semibold text-navy mb-2 uppercase tracking-wide">Email Address</label>
                    <div class="relative">
                        <i data-lucide="mail" class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-slate"></i>
                        <input 
                            type="email" 
                            id="email" 
                            class="w-full pl-10 pr-4 py-2.5 border border-gray-200 rounded-lg bg-white text-navy placeholder-gray-400 focus:border-emergency focus:outline-none focus:ring-1 focus:ring-emergency transition-all"
                            placeholder="Enter your email"
                            value="juan@example.com"
                            required
                        >
                    </div>
                </div>

                <!-- Password Input -->
                <div>
                    <label class="block text-[12px] font-semibold text-navy mb-2 uppercase tracking-wide">Password</label>
                    <div class="relative">
                        <i data-lucide="lock" class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-slate"></i>
                        <input 
                            type="password" 
                            id="password" 
                            class="w-full pl-10 pr-12 py-2.5 border border-gray-200 rounded-lg bg-white text-navy placeholder-gray-400 focus:border-emergency focus:outline-none focus:ring-1 focus:ring-emergency transition-all"
                            placeholder="Enter your password"
                            value="password123"
                            required
                        >
                        <button 
                            type="button" 
                            class="absolute right-3 top-1/2 -translate-y-1/2 text-slate hover:text-emergency transition-colors"
                            onclick="togglePasswordVisibility()"
                        >
                            <i data-lucide="eye" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>

                <!-- Forgot Password Link -->
                <div class="flex justify-end">
                    <a href="#" class="text-[12px] font-semibold text-emergency hover:text-deep transition-colors">Forgot Password?</a>
                </div>

                <!-- Login Button -->
                <button type="submit" class="btn w-full bg-gradient-to-r from-emergency to-alert hover:shadow-lg py-3 rounded-lg font-bold text-white transition-all transform hover:scale-105 active:scale-95 flex items-center justify-center gap-2">
                    <span>Login</span>
                    <i data-lucide="arrow-right" class="w-5 h-5"></i>
                </button>

                <!-- Register Link -->
                <p class="text-center text-[13px] text-slate">
                    Don't have an account? <a href="register.html" class="font-bold text-emergency hover:text-deep transition-colors">Register</a>
                </p>

            </form>

            <!-- Divider -->
            <div class="flex items-center gap-3 my-5">
                <div class="flex-1 h-[1px] bg-gray-200"></div>
                <span class="text-[12px] text-slate font-medium">Or continue with</span>
                <div class="flex-1 h-[1px] bg-gray-200"></div>
            </div>

            <!-- Social Login Buttons -->
            <div class="flex gap-3 justify-center">
                <button class="w-12 h-12 rounded-lg bg-white border border-gray-200 flex items-center justify-center hover:border-emergency hover:bg-tint transition-all" title="Login with Google">
                    <svg class="w-6 h-6" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#1F2937"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                    </svg>
                </button>
                <button class="w-12 h-12 rounded-lg bg-white border border-gray-200 flex items-center justify-center hover:border-emergency hover:bg-tint transition-all" title="Login with Facebook">
                    <svg class="w-6 h-6" viewBox="0 0 24 24" fill="#1877F2">
                        <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                    </svg>
                </button>
            </div>

            <!-- Guest Login Option -->
            <button type="button" class="w-full mt-5 py-2.5 rounded-lg border-2 border-gray-200 font-semibold text-navy hover:border-emergency hover:bg-tint transition-all" onclick="loginAsGuest()">
                Continue as Guest
            </button>

        </main>

    </div>

    <script>
        lucide.createIcons();

        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('password');
            const isPassword = passwordInput.type === 'password';
            passwordInput.type = isPassword ? 'text' : 'password';
        }

        function loginAsGuest() {
            alert('Guest login feature will be implemented');
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            const submitBtn = this.querySelector('button[type="submit"]');
            submitBtn.classList.add('loading');
            submitBtn.disabled = true;
            
            console.log('Login attempt:', { email, password });
            
            // Simulate network delay
            setTimeout(() => {
                submitBtn.classList.remove('loading');
                submitBtn.disabled = false;
                
                // Set comprehensive user session for connectivity demo
                const userData = {
                    name: 'Juan Dela Cruz',
                    phone: '0917-555-1234',
                    address: '45 Calle Uno St., Brgy. Kapitolyo, Pasig City',
                    barangay: 'Kapitolyo',
                    id: 'PCC-2024-78921',
                    medical: {
                        bloodType: 'O+',
                        allergies: 'Penicillin, Shellfish',
                        conditions: 'Hypertension, Type 2 Diabetes',
                        medications: 'Metformin 500mg, Amlodipine 5mg',
                        physician: 'Dr. Ana Reyes — The Medical City'
                    },
                    emergencyContact: {
                        name: 'Maria Santos (Mother)',
                        phone: '0917-555-9876'
                    }
                };
                localStorage.setItem('ligtas_user_session', JSON.stringify(userData));

                // Redirect to the alert page after successful login
                window.location.href = '../alert-mainPage.html';
            }, 1500);
        });
    </script>

</body>
</html>
