<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LIGTAS — Admin Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
  --bg: #0D0F1A;
  --bg-card: #141720;
  --bg-elevated: #1C1F2E;
  --border: #252837;
  --text-primary: #F1F5F9;
  --text-muted: #64748B;
  --text-micro: #4B5563;

  --critical: #EF4444;
  --warning: #F59E0B;
  --nominal: #3B82F6;
  --success: #22C55E;

  --radius: 4px;
  --radius-lg: 6px;
}

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      letter-spacing: -0.01em;
    }

    /* Background Aesthetics */
    .bg-grid {
      position: absolute;
      inset: 0;
      background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 64px 64px;
      opacity: 0.2;
      z-index: 0;
    }

    .bg-glow {
      position: absolute;
      width: 800px;
      height: 800px;
      background: radial-gradient(circle, rgba(59, 130, 246, 0.05) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 0;
      pointer-events: none;
    }

    /* Login Container */
    .login-wrap {
      width: 400px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 48px;
      z-index: 10;
      box-shadow: 0 32px 64px rgba(0, 0, 0, 0.4);
      animation: fade-in-up 0.4s ease-out forwards;
    }

    @keyframes fade-in-up {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 8px;
    }

    .brand svg {
      color: var(--critical);
      width: 24px;
      height: 24px;
    }

    .brand span {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: var(--text-primary);
    }

    .subtitle {
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 40px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-weight: 600;
    }

    /* Forms */
    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .input-text {
      width: 100%;
      padding: 12px 16px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-primary);
      font-size: 13px;
      font-family: inherit;
      outline: none;
      transition: all 0.1s;
    }

    .input-text:focus {
      border-color: var(--nominal);
      background: var(--bg-elevated);
    }

    .input-text::placeholder {
      color: var(--text-micro);
    }

    .options-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }

    .checkbox-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .checkbox-wrap input {
      cursor: pointer;
      accent-color: var(--nominal);
      width: 14px;
      height: 14px;
    }

    .checkbox-wrap span {
      font-size: 12px;
      color: var(--text-muted);
      user-select: none;
    }

    .forgot-link {
      font-size: 12px;
      color: var(--nominal);
      text-decoration: none;
      transition: opacity 0.1s;
    }

    .forgot-link:hover {
      opacity: 0.8;
    }

    .btn-submit {
      width: 100%;
      padding: 14px;
      background: var(--nominal);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .btn-submit:hover {
      background: #2563EB;
    }

    .btn-submit:active {
      transform: translateY(0);
    }

    /* Footer Status */
    .sys-status {
      position: absolute;
      bottom: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 10px;
      color: var(--text-micro);
      z-index: 10;
      font-family: 'IBM Plex Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .pulse {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--success);
    }

    @keyframes pulse {

      0%,
      100% {
        box-shadow: 0 0 0 0 rgba(63, 185, 80, 0.5);
      }

      50% {
        box-shadow: 0 0 0 4px rgba(63, 185, 80, 0);
      }
    }

    .loading-spinner {
      display: none;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
    .input-select {
      width: 100%;
      padding: 12px 16px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-primary);
      font-size: 13px;
      font-family: inherit;
      outline: none;
      transition: all 0.1s;
      cursor: pointer;
      appearance: none;
      background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%2364748b' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
      background-repeat: no-repeat;
      background-position: right 12px center;
      background-size: 16px;
    }
    .input-select:focus {
      border-color: var(--nominal);
      background: var(--bg-elevated);
    }
    .input-select option {
      background: var(--bg-card);
      color: var(--text-primary);
    }
    .demo-hint {
      background: rgba(59, 130, 246, 0.03);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 24px;
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.6;
    }
    .demo-hint strong {
      color: var(--text-primary);
      font-weight: 600;
      display: block;
      margin-bottom: 4px;
    }
    .demo-hint .mono {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--nominal);
    }
  
/* NEARBY VOLUNTEERS PANEL */
.vol-panel { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-top: 16px; }
.vol-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.vol-header h3 { font-size: 13px; font-weight: 600; color: var(--text); margin: 0; }
.vol-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.vol-card { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 10px; display: flex; gap: 10px; align-items: flex-start; cursor: pointer; transition: all 0.2s; position: relative; }
.vol-card:hover { border-color: var(--primary); }
.vol-card.selected { border-color: var(--primary); background: var(--primary-dim); }
.vol-card-checkbox { position: absolute; top: 10px; right: 10px; width: 14px; height: 14px; }
.vol-avatar-mini { width: 32px; height: 32px; border-radius: 50%; background: var(--bg4); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; color: var(--text2); flex-shrink: 0; }
.vol-info { flex: 1; }
.vol-name { font-size: 12.5px; font-weight: 500; margin-bottom: 2px; }
.vol-meta { font-size: 11px; color: var(--text3); margin-bottom: 4px; }
.vol-skill-badge { display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 4px; background: var(--bg4); color: var(--text2); margin-right: 4px; }
.rec-badge { font-size: 9px; padding: 2px 5px; border-radius: 4px; background: var(--primary); color: white; font-weight: 600; text-transform: uppercase; display: inline-block; margin-bottom: 4px; }

/* BROADCAST TOGGLE & PANEL */
.broadcast-section { background: rgba(47, 129, 247, 0.05); border: 1px solid rgba(47, 129, 247, 0.2); border-radius: var(--radius); padding: 16px; margin-top: 16px; }
.toggle-row { display: flex; justify-content: space-between; align-items: center; }
.toggle-info h3 { font-size: 13.5px; font-weight: 600; margin: 0; }
.toggle-info p { font-size: 11.5px; color: var(--text3); margin: 2px 0 0; }
.switch { position: relative; display: inline-block; width: 36px; height: 20px; }
.switch input { opacity: 0; width: 0; height: 0; }
.slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: var(--bg4); transition: .4s; border-radius: 20px; }
.slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
input:checked + .slider { background-color: var(--primary); }
input:checked + .slider:before { transform: translateX(16px); }
.broadcast-options { margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); display: none; }
.broadcast-options.active { display: block; }
.channel-grid-mini { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; margin-top: 12px; }
.channel-item { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text2); }

/* SECTION HEADERS */
.form-section-head { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text3); margin: 20px 0 12px; display: flex; align-items: center; gap: 8px; }
.form-section-head::after { content: ""; height: 1px; background: var(--border); flex: 1; }
</style>
</head>

<body>

  <!-- Background Elements -->
  <div class="bg-grid"></div>
  <div class="bg-glow"></div>

  <!-- Login Card -->
  <div class="login-wrap">
    <div class="brand">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 2L3 7v6c0 5.25 3.75 10.15 9 11.25C17.25 23.15 21 18.25 21 13V7l-9-5z" />
      </svg>
      <span>LIGTAS</span>
    </div>
    <div class="subtitle">Admin Command Center</div>

    <form id="login-form">
      <div class="form-group">
        <label>Admin ID / Email</label>
        <input type="text" class="input-text" placeholder="Enter your ID or email" value="cmd.reyes" required
          autocomplete="username">
      </div>
      <div class="form-group">
        <label>Passcode</label>
        <input type="password" class="input-text" placeholder="••••••••" value="password123" required
          autocomplete="current-password">
      </div>
      <div class="form-group">
        <label>Login Role</label>
        <select class="input-select" id="role-select">
          <option value="Super Admin">Super Admin — Full System Access</option>
          <option value="Admin">Admin — Standard Operations</option>
        </select>
      </div>

      <div class="demo-hint">
        <strong>Demo Credentials</strong><br>
        <span class="mono">Super Admin:</span> cmd.reyes / password123<br>
        <span class="mono">Admin:</span> admin.pasig / password123
      </div>

      <div class="options-row">
        <label class="checkbox-wrap">
          <input type="checkbox" checked>
          <span>Remember session</span>
        </label>
        <a href="#" class="forgot-link">Forgot passcode?</a>
      </div>

      <button type="submit" class="btn-submit" id="submit-btn">
        <span id="btn-text">Secure Login</span>
        <svg id="btn-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 12h14M12 5l7 7-7 7" />
        </svg>
        <div class="loading-spinner" id="spinner"></div>
      </button>
    </form>
  </div>

  <div class="sys-status">
    <div class="pulse"></div>
    <span>Secure Node Active v2.4</span>
  </div>

  <script>
    function logAction(action, target, detail) {
      const log = JSON.parse(localStorage.getItem('ligtas_audit') || '[]');
      log.unshift({
        id: 'LOG-' + Date.now(),
        timestamp: new Date().toLocaleString('en-PH'),
        admin: localStorage.getItem('ligtas_user') || 'Cmdr. Reyes',
        action,
        target: target || '—',
        detail: detail || '—',
        ip: '192.168.1.' + Math.floor(Math.random() * 50 + 10)
      });
      localStorage.setItem('ligtas_audit', JSON.stringify(log.slice(0, 200)));
    }
  </script>
  <script>
    document.getElementById('login-form')
      .addEventListener('submit', function(e) {
        e.preventDefault();
        
        const btn = document.getElementById('submit-btn');
        const text = document.getElementById('btn-text');
        const icon = document.getElementById('btn-icon');
        const spinner = document.getElementById('spinner');
        const role = document.getElementById(
          'role-select'
        ).value;
        const userInput = document.querySelector(
          '.input-text[autocomplete="username"]'
        ).value;
        const userName = role === 'Super Admin' 
          ? 'Cmdr. Reyes' 
          : 'Admin Pasig';

        // Store role, user, and session start
        localStorage.setItem('ligtas_role', role);
        localStorage.setItem('ligtas_user', userName);
        sessionStorage.setItem(
          'ligtas_session_start', 
          Date.now().toString()
        );

        // Reset audit log on fresh login 
        // (keep last 50 entries for continuity)
        const existing = JSON.parse(
          localStorage.getItem('ligtas_audit') || '[]'
        );
        localStorage.setItem(
          'ligtas_audit', 
          JSON.stringify(existing.slice(0, 50))
        );

        // Log the login event
        logAction(
          'Login', 
          userInput, 
          'Logged in as ' + role + 
          ' from 192.168.1.' + 
          Math.floor(Math.random() * 50 + 10)
        );

        // Loading state
        btn.style.pointerEvents = 'none';
        text.textContent = 'Authenticating...';
        icon.style.display = 'none';
        spinner.style.display = 'block';

        setTimeout(() => {
          window.location.href = 'index.html';
        }, 800);
      });
  </script>
</body>
</html>
